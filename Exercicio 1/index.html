<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosa Azul</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            margin: 0;
        }

        .flex-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            width: 18rem;
        }

        .card-img-top {
            height: 300px;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <div class="flex-container">
        <div class="card shadow-lg">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKZ3tLPaioy7eqyiE6JZ3o0MwY1ahWv7sgmZCD8JjG-aWdTg5a43bMMo2O&s=10"
                class="card-img-top"
                alt="Rosa Azul">

            <div class="card-body">
                <h5 class="card-title">🌹 Rosa Azul</h5>

                <p class="card-text">
                    Uma Rosa Azul, símbolo de esperança, mistério e sonhos que parecem impossíveis.
                </p>

                <a href="#" class="btn btn-primary">
                    Ver Mais
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
